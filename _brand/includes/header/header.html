<header class="ark-alliance__site-header py-4 d-none d-md-block">
  <div class="container">
    <a href="{{ site.baseurl }}/"
       class="d-flex justify-content-center text-decoration-none">
      <svg class="ark-alliance__logo icon-lg">
        <title>ARK Alliance</title>
        <use href="#icon-ark"></use>
      </svg>
      <div>
        <h1 class="ark-alliance__title display-1 mb-0">
          {{ site.title }}
        </h1>
        <p class="ark-alliance__tagline mb-0">
          {{ site.tagline }}
        </p>
      </div>
    </a>
  </div>
</header>
